version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: khachsan_postgres
    environment:
      POSTGRES_DB: khachsan_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
